<!-- DASHBOARD SECTION -->
<h2 class="page-title">Dashboard Monitoring API</h2>
    <p class="page-subtitle">Pantau status pengiriman data dan integrasi API real-time</p>

    <!-- Statistics -->
    <div class="stats-grid" id="stats-container">
        <div class="stat-card info">
            <div>
                <div class="stat-label">Total Data</div>
                <div class="stat-value" id="stat-total">0</div>
            </div>
            <div class="stat-footer">
                <i class="bi bi-database"></i>
                <span>Records di database</span>
            </div>
        </div>

        <div class="stat-card warning">
            <div>
                <div class="stat-label">Data Siap Kirim</div>
                <div class="stat-value" id="stat-pending">0</div>
            </div>
            <div class="stat-footer">
                <i class="bi bi-hourglass-top"></i>
                <span>Menunggu pengiriman</span>
            </div>
        </div>

        <div class="stat-card success">
            <div>
                <div class="stat-label">Data Terkirim</div>
                <div class="stat-value" id="stat-sent">0</div>
            </div>
            <div class="stat-footer">
                <i class="bi bi-check-circle"></i>
                <span>Berhasil dikirim</span>
            </div>
        </div>

    </div>

    <!-- Last Sync Info -->
    <div class="sync-info-bar">
        <div class="sync-info-content">
            <i class="bi bi-clock-history text-primary"></i>
            <span>Sinkronisasi terakhir: <strong id="last-sync">-</strong></span>
        </div>
        <div class="sync-actions">
            <button class="btn btn-sm btn-outline-primary" onclick="refreshStats()" 
                    style="border: 1px solid var(--primary); color: var(--primary); background: white; padding: 0.3rem 0.8rem; border-radius: 6px; font-size: 0.85rem; cursor: pointer;">
                <i class="bi bi-arrow-clockwise"></i> Refresh
            </button>

            <!-- Send Manual-->
            <button class="btn btn-sm btn-outline-success" onclick="sendPendingData()" 
                    style="border: 1px solid var(--success); color: var(--success); background: white; padding: 0.3rem 0.8rem; border-radius: 6px; font-size: 0.85rem; cursor: pointer; margin-left: 0.5rem;">
                <i class="bi bi-send"></i> Kirim Manual
            </button>
        </div>
    </div>


    <!-- Tampilkan semua data di database-->
    
    <!-- Filter -->
    <div class="filter-group" style="display: none;">
        <div>
            <label>Tanggal Mulai</label>
            <input type="date" id="filter-all-from" />
        </div>
        <div>
            <label>Tanggal Akhir</label>
            <input type="date" id="filter-all-to" />
        </div>
        <div style="display: flex; gap: 0.5rem;">
            <button class="filter-btn" onclick="filterAllData()">
                <i class="bi bi-search"></i> Filter
            </button>
        </div>
    </div>

    <!-- Table -->
    <div class="section">
        <div class="table-container">
            <div class="table-responsive">
                <table class="table" id="all-data-table">
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>Tanggal</th>
                            <th>pH</th>
                            <th>ORP</th>
                            <th>TDS</th>
                            <th>DO</th>
                            <th>KLH</th>
                            <th>HAS</th>
                        </tr>
                    </thead>
                    <tbody id="all-data-body">
                        <tr>
                            <td colspan="8" class="text-center text-muted">
                                <div class="loading">
                                    <div class="loading-spinner"></div>
                                    <p>Memuat data...</p>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
