<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - API Monitoring System</title>
    
    <!-- External Libraries -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/datatables.net-bs5@1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <link href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/jquery-datetimepicker@2.5.20/build/jquery.datetimepicker.min.css" rel="stylesheet">

    <!-- CSS Files (Modular) -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/config.css">
</head>
<body>
    
    <!-- ============== HEADER ============== -->
    <div id="header-container"></div>

    <!-- ============== MAIN CONTAINER ============== -->
    <div class="container-main">
        
        <!-- ============== SIDEBAR ============== -->
        <div id="sidebar-container"></div>

        <!-- ============== MAIN CONTENT ============== -->
        <main class="main-content">
            
            <!-- Dashboard Section -->
            <div id="dashboard-section"></div>

            <!-- Config Section -->
            <div id="config-section" style="display: none;"></div>

        </main>
    </div>

    <!-- ============== SCRIPTS ============== -->
    <!-- External Libraries -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery-datetimepicker@2.5.20/build/jquery.datetimepicker.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/dataTables.bootstrap5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Modular JavaScript Files -->
    <script src="js/main.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/config.js"></script>

    <!-- Component Loader Script -->
    <script>
        // Load components (header, sidebar, and sections)
        async function loadComponents() {
            try {
                // Load header
                const headerResponse = await fetch('components/header.html');
                const headerContent = await headerResponse.text();
                document.getElementById('header-container').innerHTML = headerContent;

                // Load sidebar
                const sidebarResponse = await fetch('components/sidebar.html');
                const sidebarContent = await sidebarResponse.text();
                document.getElementById('sidebar-container').innerHTML = sidebarContent;

                // Load sections
                const dashboardResponse = await fetch('sections/dashboard.html');
                const dashboardContent = await dashboardResponse.text();
                document.getElementById('dashboard-section').innerHTML = dashboardContent;


                const configResponse = await fetch('sections/config.html');
                const configContent = await configResponse.text();
                document.getElementById('config-section').innerHTML = configContent;

                // Components loaded successfully, now load dashboard data
                if (typeof loadDashboard === 'function') {
                    loadDashboard();
                }

                // Start real-time clock
                if (typeof startRealTimeClock === 'function') {
                    startRealTimeClock();
                }

            } catch (error) {
                console.error('Error loading components:', error);
            }
        }

        // Load components before DOMContentLoaded fires
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadComponents);
        } else {
            loadComponents();
        }


        
    </script>

</body>
</html>
