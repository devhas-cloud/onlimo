<!-- HEADER COMPONENT -->
<header class="header">
    <div class="header-left">
        <button class="mobile-menu-btn" onclick="toggleSidebar()">
            <i class="bi bi-list"></i>
        </button>
        <i class="bi bi-speedometer2" style="font-size: 1.5rem; color: var(--primary);"></i>
        <h1>API Monitor</h1>
    </div>
    <div class="header-right">
        <div class="clock-display" id="clock-display">
            <i class="bi bi-clock" style="font-size: 1rem; color: var(--text-muted); margin-right: 8px;"></i>
            <span id="current-time" style="font-family: 'Courier New', monospace; font-weight: 500;">--:--:--</span>
        </div>
        <div class="user-info">
            <i class="bi bi-person-circle" style="font-size: 1.5rem; color: var(--text-muted);"></i>
            <span id="username-display">Admin</span>
        </div>
        <button class="logout-btn" onclick="logout()">
            <i class="bi bi-box-arrow-left"></i> Logout
        </button>
    </div>
</header>
